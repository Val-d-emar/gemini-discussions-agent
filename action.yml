name: "Gemini Discussion Agent"
description: "AI agent for analyzing and responding to GitHub Discussions"
author: "Val-d-emar"

branding:
  icon: "message-square"
  color: "blue"

inputs:
  gemini_api_key:
    description: "API Key for Gemini"
    required: true
  github_token:
    description: "GitHub Token with discussion:write scope"
    required: false
    default: ${{ github.token }}
  agent_prompt:
    description: "Instructions for the AI agent"
    required: false
    default: >
      You are a helpful technical assistant.
      Analyze the provided discussion context (Original Post and all comments).
      Answer the user's specific question or provide a critique if requested.
      IF user requests, make any necessary allowed operations with the repository: 
      - read andwrite code, 
      - run tests, 
      - make changes, 
      - create branches, 
      - create pull requests,
      - merge pull requests, 
      - create issues,
      - close issues,
      - asc code reviews,
      - etc.
      Report if the user's request cannot be fulfilled.
      Be concise and factual.
  agent_language:
    description: "Language for the response"
    required: false
    default: "English"
  agent_model:
    description: "Model for the AI agent (pro, flash, flash-lite, auto)"
    required: false
    default: "flash"
  comment_title:
    description: "Title to prepend to the response"
    required: false
    default: "### 🤖 Gemini Discussion Agent"

runs:
  using: "composite"
  steps:
    - name: Extract Model Tag
      id: extract_model
      shell: bash
      run: |
        # Извлекаем первую строку и ищем тег @model с названием модели
        MODEL=$(echo "$COMMENT_BODY" | head -n 1 | grep -oP '@model\s+\K[a-zA-Z0-9.-]+' || echo "$AGENT_MODEL")
        echo "model=$MODEL" >> $GITHUB_OUTPUT
      env:
        COMMENT_BODY: ${{ github.event.comment.body || github.event.discussion.body }}
        AGENT_MODEL: ${{ inputs.agent_model }}

    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ inputs.github_token }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24"

    - name: Install Gemini CLI
      run: npm install -g @google/gemini-cli
      shell: bash

    - name: Fetch Discussion Context
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      shell: bash
      run: |
        REPO_OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
        REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
        D_NUM=${{ github.event.discussion.number }}

        if [ -z "$D_NUM" ]; then
          echo "Error: Discussion number not found in event context."
          exit 1
        fi

        gh api graphql -f query='
        query($owner: String!, $repo: String!, $num: Int!) {
          repository(owner: $owner, name: $repo) {
            discussion(number: $num) {
              id
              title
              body
              comments(first: 100) {
                nodes {
                  author { login }
                  body
                  replies(first: 50) {
                    nodes {
                      author { login }
                      body
                    }
                  }
                }
              }
            }
          }
        }' -f owner="$REPO_OWNER" -f repo="$REPO_NAME" -F num=$D_NUM > raw_data.json

        DISCUSSION_ID=$(jq -r '.data.repository.discussion.id // empty' raw_data.json)
        if [ -z "$DISCUSSION_ID" ]; then
          echo "Error: Could not fetch discussion data."
          cat raw_data.json
          exit 1
        fi
        echo "DISCUSSION_ID=$DISCUSSION_ID" >> $GITHUB_ENV

    - name: Prepare Context and Run Gemini
      env:
        GEMINI_API_KEYS: ${{ inputs.gemini_api_key }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GH_TOKEN: ${{ inputs.github_token }}
        USER_PROMPT: ${{ inputs.agent_prompt }}
        USER_LANG: ${{ inputs.agent_language }}
        GEMINI_MODEL: ${{ steps.extract_model.outputs.model }}
      shell: bash
      run: |
        set +e
        mkdir -p .gemini
        
        # Настраиваем Git и GitHub CLI для авторизации
        git config --global user.name "gemini-discussion-agent"
        git config --global user.email "actions@github.com"
        git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        
        # Настройка gh CLI (использует GH_TOKEN из env)
        if command -v gh >/dev/null 2>&1; then
          gh auth setup-git
        fi

        # Включаем инструменты
        echo '{"tools": {"core": ["run_shell_command", "write_file", "read_file", "glob", "grep_search"]}}' > .gemini/settings.json

        if ! jq -r '.data.repository.discussion.title' raw_data.json > /dev/null 2>&1; then
           echo "### ❌ System Error" > raw_answer.md
           echo "Failed to parse discussion data." >> raw_answer.md
           exit 0
        fi

        # Генерируем карту проекта
        echo "--- PROJECT STRUCTURE ---" > project_map.txt
        find . -maxdepth 3 -not -path '*/.*' -not -path './node_modules*' >> project_map.txt

        # Подготовка контекста
        echo "TOPIC: $(jq -r '.data.repository.discussion.title' raw_data.json)" > discussion_context.txt
        echo "OP: $(jq -r '.data.repository.discussion.body' raw_data.json)" >> discussion_context.txt
        echo -e "\n--- CONVERSATION ---" >> discussion_context.txt
        jq -r '.data.repository.discussion.comments.nodes[] | "USER \(.author.login): \(.body) " + ([.replies.nodes[] | "REPLY \(.author.login): \(.body)"] | join(" "))' raw_data.json >> discussion_context.txt

        # Разделяем ключи
        IFS=',' read -ra KEYS <<< "$GEMINI_API_KEYS"
        
        # Инструкция: разрешаем использование gh CLI
        SYSTEM_PREFIX="[SYSTEM: Tech Assistant. Answer in ${USER_LANG}. You CAN use 'gh' CLI for PRs, Issues and 'git' for commits/pushes. Use Project Map. Minimize turns.]"
        FINAL_PROMPT="${SYSTEM_PREFIX}\n\nPROJECT MAP:\n$(cat project_map.txt)\n\nUSER PROMPT: ${USER_PROMPT}\n\nContext: @discussion_context.txt"

        SUCCESS=false
        for KEY in "${KEYS[@]}"; do
          KEY_TRIMMED=$(echo $KEY | xargs)
          echo "Attempting with API Key (prefix: ${KEY_TRIMMED:0:4}...)"
          
          if GEMINI_API_KEY=$KEY_TRIMMED gemini -m "$GEMINI_MODEL" \
            --approval-mode=yolo \
            -p "$FINAL_PROMPT" > raw_answer.md 2> error.log; then
            SUCCESS=true
            break
          else
            ERROR_CONTENT=$(cat error.log)
            echo "Error: $ERROR_CONTENT"
            if [[ "$ERROR_CONTENT" == *"Quota exceeded"* || "$ERROR_CONTENT" == *"exhausted your daily quota"* ]]; then
              echo "Quota exceeded for current key, trying next..."
              continue
            else
              # Если ошибка не связана с квотой, прерываем и выводим её
              break
            fi
          fi
        done

        if [ "$SUCCESS" = false ]; then
          {
            echo "### ❌ Gemini Agent Error"
            echo "All provided API keys failed or hit quota limits."
            echo ""
            echo "<details><summary>🔍 Last error log</summary>"
            echo ""
            echo "\`\`\`text"
            cat error.log
            echo "\`\`\`"
            echo "</details>"
            echo ""
            echo "🔗 [Открыть логи GitHub Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } > raw_answer.md
        fi

    - name: Post Comment
      if: always()
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      shell: bash
      run: |
        # Если файл не был создан по какой-то причине
        if [ ! -f raw_answer.md ]; then
          echo "### ❌ Fatal Action Error" > raw_answer.md
          echo "The agent failed before it could generate a response." >> raw_answer.md
        fi

        printf "%s\n\n" "${{ inputs.comment_title }}" > final_body.md
        cat raw_answer.md >> final_body.md

        gh api graphql -f query='
        mutation($id: ID!, $body: String!) {
          addDiscussionComment(input: {discussionId: $id, body: $body}) {
            comment { url }
          }
        }' -f id="${{ env.DISCUSSION_ID }}" -F body=@final_body.md
