on:
  discussion_comment:
    types: [created]

permissions:
  discussions: write
  contents: read
  
jobs:
  gemini_respond:
    # Запускать только если в комментарии есть тег @gemini или другой триггер
    if: contains(github.event.comment.body, '@ai-agent-net')
    runs-on: ubuntu-latest
    steps:
      - uses: Val-d-emar/gemini-discussions-agent@main
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # github_token: ${{ secrets.GITHUB_TOKEN }}
          agent_prompt: "Проанализируй текущий вопрос пользователя в контексте всего обсуждения и дай аргументированный ответ."
          agent_language: "Russian"
