on:
  discussion_comment:
    types: [created]

jobs:
  gemini_respond:
    # Запускать только если в комментарии есть тег @gemini или другой триггер
    if: contains(github.event.comment.body, '@gemini')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./path-to-your-action # или репозиторий: username/repo@main
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # github_token: ${{ secrets.GITHUB_TOKEN }}
          agent_prompt: "Проанализируй текущий вопрос пользователя в контексте всего обсуждения и дай аргументированный ответ."
          agent_language: "Russian"
