name: Gemini Discussion Agent

on:
  discussion_comment:
    types: [created, edited]
  discussion:
    types: [created]
    
permissions:
  discussions: write
  contents: read

concurrency:
  group: ai-discussion-agent-${{ github.event.action }}-${{ github.actor.login || github.run_id }}
  cancel-in-progress: false

jobs:
  gemini_respond:
    if: contains(github.event.comment.body, '@ai-agent-net')
    runs-on: ubuntu-latest
    steps:
      - uses: Val-d-emar/gemini-discussion-agent@main
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.AI_TOKEN_PAT }}
          agent_language: "Russian"
          agent_model: "flash"
